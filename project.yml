name: WalkWorthy
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
configs:
  Debug: debug
  Release: release
targets:
  WalkWorthy:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.walkworthy
        INFOPLIST_FILE: WalkWorthy/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1
    preBuildScripts: []
    postBuildScripts: []
  WalkWorthyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WalkWorthyTests
    dependencies:
      - target: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.walkworthy.tests
        GENERATE_INFOPLIST_FILE: YES
  WalkWorthyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WalkWorthyUITests
    dependencies:
      - target: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.walkworthy.uitests
        TEST_TARGET_NAME: WalkWorthy
        GENERATE_INFOPLIST_FILE: YES
schemes:
  WalkWorthy:
    build:
      targets:
        WalkWorthy: all
        WalkWorthyTests: [test]
        WalkWorthyUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - WalkWorthyTests
        - WalkWorthyUITests
    run:
      config: Debug
    archive:
      config: Release
