name: WalkWorthy
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    SWIFT_VERSION: 5.10
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
configs:
  Debug: debug
  Release: release
packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios.git
    from: 5.0.0
targets:
  WalkWorthy:
    type: application
    platform: iOS
    deploymentTarget: '17.0'
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.tend
        PRODUCT_NAME: Tend
        PRODUCT_MODULE_NAME: WalkWorthy
        INFOPLIST_FILE: WalkWorthy/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: WalkWorthy/Resources/WalkWorthy.entitlements
        TARGETED_DEVICE_FAMILY: 1
    preBuildScripts: []
    postBuildScripts: []
    dependencies:
      - target: TendWidgets
        embed: true
      - package: RevenueCat
        product: RevenueCat
  TendWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: '17.0'
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    sources:
      - path: TendWidgets
      - path: WalkWorthy/Shared/AppConstants.swift
        group: WalkWorthy/Shared
      - path: WalkWorthy/Shared/Widget
        group: WalkWorthy/Shared
      - path: WalkWorthy/DesignSystem/WWColor.swift
        group: WalkWorthy/DesignSystem
      - path: WalkWorthy/DesignSystem/WWTypography.swift
        group: WalkWorthy/DesignSystem
      - path: TendWidgets/Assets.xcassets
        group: TendWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.tend.widgets
        PRODUCT_NAME: TendWidgets
        PRODUCT_MODULE_NAME: TendWidgets
        INFOPLIST_FILE: TendWidgets/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TendWidgets/TendWidgets.entitlements
        TARGETED_DEVICE_FAMILY: 1
        APPLICATION_EXTENSION_API_ONLY: YES
  WalkWorthyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WalkWorthyTests
    dependencies:
      - target: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.tend.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Tend.app/Tend
        BUNDLE_LOADER: $(TEST_HOST)
  WalkWorthyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '17.0'
    sources:
      - path: WalkWorthyUITests
    dependencies:
      - target: WalkWorthy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: co.keeganryan.tend.uitests
        TEST_TARGET_NAME: WalkWorthy
        GENERATE_INFOPLIST_FILE: YES
schemes:
  WalkWorthy:
    build:
      targets:
        WalkWorthy: all
        TendWidgets: all
        WalkWorthyTests: [test]
        WalkWorthyUITests: [test]
    test:
      gatherCoverageData: true
      targets:
        - WalkWorthyTests
        - WalkWorthyUITests
    run:
      config: Debug
    archive:
      config: Release
